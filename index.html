<body>
  <div class="music-box">
    <h1>Study Time Tracker</h1>
    <div id="studyTimer">00:00:00</div>

    <div class="controls">
      <button id="startStudy">Start</button>
      <button id="pauseStudy">Pause</button>
      <button id="resetStudy">Reset</button>
    </div>

    <hr>

    <div class="now-playing">Now playing</div>
    <div class="song-title" id="songTitle">Loading...</div>

    <div class="controls">
      <button id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
    </div>

    <div class="volume-wrap">
      <div class="volume-label">Volume: <span id="volumeValue">50</span>%</div>
      <input type="range" id="volumeSlider" min="0" max="100" value="50" />
    </div>
  </div>

  <div id="player"></div>
</body>
