<!DOCTYPE html>
<html lang="en">
<head>
  
  <style>
  :root {
    :root {
  --bg1: #0f172a;
  --bg2: #1e293b;
  --accent: #60a5fa;
  --accent2: #a78bfa;
}
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: var(--text);
    background:
      linear-gradient(135deg, var(--bg1), var(--bg2));
  }

  .container {
    width: 90%;
    max-width: 500px;
    padding: 32px;
    border-radius: 24px;
    background: var(--card);
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    text-align: center;
  }

  h1 {
    margin-top: 0;
    font-size: 2rem;
  }

  p {
    color: var(--muted);
  }

  .timer {
    font-size: 2.2rem;
    font-weight: bold;
    margin: 20px 0;
  }

  button {
    border: none;
    padding: 12px 18px;
    border-radius: 14px;
    font-size: 1rem;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }

  button:hover {
    transform: translateY(-2px);
  }
</style>
 
<body>
  <div class="container">
  <h1>Milk Time Counter</h1>
  <p>Track your milk time here</p>
  <div class="timer">00:00:00</div>
  <button>Reset</button>
</div>
  <div class="card">
    <h1>Study Time Tracker</h1>
    <p id="status">Loading...</p>
    <div id="timer">00:00:00</div>
    <button onclick="resetTimer()">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
    }

    .music-box {
      width: 90%;
      max-width: 420px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      text-align: center;
    }

    .now-playing {
      font-size: 14px;
      color: #d1d5db;
      margin-bottom: 8px;
    }

    .song-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      background: #3b82f6;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .volume-wrap {
      margin-top: 12px;
    }

    .volume-label {
      margin-bottom: 8px;
      font-size: 14px;
      color: #d1d5db;
    }

    input[type="range"] {
      width: 100%;
    }

    /* Hide the actual YouTube player */
    #player {
      width: 1px;
      height: 1px;
      opacity: 0.01;
      pointer-events: none;
      position: absolute;
      left: -9999px;
    }
  </style>
</head>
<body>
  <div class="music-box">
    <div class="now-playing">Now playing</div>
    <div class="song-title" id="songTitle">Loading...</div>

    <div class="controls">
      <button id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
    </div>

    <div class="volume-wrap">
      <div class="volume-label">Volume: <span id="volumeValue">50</span>%</div>
      <input type="range" id="volumeSlider" min="0" max="100" value="50" />
    </div>
  </div>

  <div id="player"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;

    const VIDEO_ID = "OO2kPK5-qno?si=CUdGsug9_iW2Wi9t"; // change this to your YouTube video ID

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        height: "1",
        width: "1",
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 0,
          modestbranding: 1,
          rel: 0
        },
        events: {
          onReady: onPlayerReady
        }
      });
    }

    function onPlayerReady(event) {
      player.setVolume(50);
      updateSongTitle();
    }

    function updateSongTitle() {
      if (player && player.getVideoData) {
        const data = player.getVideoData();
        document.getElementById("songTitle").textContent = data.title || "Unknown track";
      }
    }

    document.getElementById("playBtn").addEventListener("click", () => {
      if (player) {
        player.playVideo();
        updateSongTitle();
      }
    });

    document.getElementById("pauseBtn").addEventListener("click", () => {
      if (player) {
        player.pauseVideo();
      }
    });

    const volumeSlider = document.getElementById("volumeSlider");
    const volumeValue = document.getElementById("volumeValue");

    volumeSlider.addEventListener("input", () => {
      const volume = Number(volumeSlider.value);
      volumeValue.textContent = volume;
      if (player) {
        player.setVolume(volume);
      }
    });
  </script>
</body>
</html>
