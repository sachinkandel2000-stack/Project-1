<!DOCTYPE html>
<html lang="en">
<head>
  <style>
  :root {
    :root {
  --bg1: #0f172a;
  --bg2: #1e293b;
  --accent: #60a5fa;
  --accent2: #a78bfa;
}
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: var(--text);
    background:
      linear-gradient(135deg, var(--bg1), var(--bg2));
  }

  .container {
    width: 90%;
    max-width: 500px;
    padding: 32px;
    border-radius: 24px;
    background: var(--card);
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    text-align: center;
  }

  h1 {
    margin-top: 0;
    font-size: 2rem;
  }

  p {
    color: var(--muted);
  }

  .timer {
    font-size: 2.2rem;
    font-weight: bold;
    margin: 20px 0;
  }

  button {
    border: none;
    padding: 12px 18px;
    border-radius: 14px;
    font-size: 1rem;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }

  button:hover {
    transform: translateY(-2px);
  }
</style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Time Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
  <h1>Milk Time Counter</h1>
  <p>Track your milk time here</p>
  <div class="timer">00:00:00</div>
  <button>Reset</button>
</div>
  <div class="card">
    <h1>Study Time Tracker</h1>
    <p id="status">Loading...</p>
    <div id="timer">00:00:00</div>
    <button onclick="resetTimer()">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
